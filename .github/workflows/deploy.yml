name: Deploy to GitHub Pages

# Deploys ride commits: Pages keys deployments on pages_build_version
# (= GITHUB_SHA, not overridable), and redeploying an unchanged SHA usually
# no-ops silently. The nightly rollover therefore lives in roll.yml, which
# COMMITS today/* and then dispatches this workflow on the fresh SHA. A
# manual dispatch without a new commit may not update served content.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Whole-collection integrity gate: a corrupt or missing asset for any
      # FUTURE day must fail here, not surface weeks later when its day comes.
      - name: Validate the collection
        run: node scripts/validate.mjs
      - name: Materialize today's artwork
        run: TZ=America/Los_Angeles node scripts/today.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      # Pages deployment intermittently fails with "try again later"; an
      # immediate retry tends to hit the same transient state, so cool down
      # first. The cron runs unattended overnight — it must self-heal.
      - if: steps.deployment.outcome == 'failure'
        run: sleep 120
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
