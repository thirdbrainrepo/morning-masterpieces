name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 08:10 UTC = just after midnight Pacific. Refreshes today.json and
    # today/wallpaper.jpg so the iOS Shortcut's stable URLs roll over daily.
    - cron: '10 8 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Materialize today's artwork
        run: TZ=America/Los_Angeles node scripts/today.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
